<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ 英雄合成进化</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
            padding: 15px;
            color: #fff;
        }
        
        h1 { text-align: center; margin-bottom: 12px; font-size: 20px; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 12px;
        }
        
        .stat { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 20px; font-weight: bold; }
        .stat-value.gold { color: #ffd700; }
        .stat-value.exp { color: #00ff88; }
        
        .heroes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .hero-slot {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
        }
        
        .hero-slot:hover { transform: scale(1.05); }
        .hero-slot.selected { 
            background: rgba(0,255,136,0.3); 
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            border: 2px solid #00ff88;
        }
        .hero-slot.locked { opacity: 0.4; cursor: not-allowed; }
        
        .hero-icon { font-size: 28px; margin-bottom: 3px; }
        .hero-name { font-size: 10px; color: #fff; }
        .hero-count { 
            position: absolute;
            top: 3px;
            right: 3px;
            background: #ff6b6b;
            color: #fff;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 8px;
        }
        
        .heroes-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .hero-card {
            width: 60px;
            height: 75px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            padding: 5px;
        }
        
        .hero-card:hover { transform: translateY(-3px); }
        .hero-card.selected { border-color: #00ff88; background: rgba(0,255,136,0.2); }
        .hero-card .icon { font-size: 26px; }
        .hero-card .name { font-size: 9px; color: #fff; margin-top: 2px; }
        
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
        }
        
        button {
            padding: 12px 20px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:active { transform: scale(0.95); }
        
        .btn-merge {
            background: linear-gradient(135deg, #00ff88, #00b4db);
            color: #1a1a2e;
        }
        
        .btn召唤 {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: #fff;
        }
        
        .tips {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 10px;
        }
        
        .progress {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 15px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #00ff88, #00b4db);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .log {
            max-width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 11px;
            max-height: 60px;
            overflow-y: auto;
        }
        
        .log-item { margin-bottom: 4px; }
        .log-item.gold { color: #ffd700; }
        .log-item.merge { color: #00ff88; }
    </style>
</head>
<body>
    <h1>⚔️ 英雄合成进化</h1>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-label">金币</div>
            <div class="stat-value gold" id="gold">1000</div>
        </div>
        <div class="stat">
            <div class="stat-label">经验</div>
            <div class="stat-value exp" id="exp">0</div>
        </div>
    </div>
    
    <div class="heroes-grid" id="grid"></div>
    
    <div class="progress">
        <div class="progress-fill" id="mergeProgress" style="width: 0%">0/10</div>
    </div>
    
    <div class="heroes-row" id="召唤s"></div>
    
    <div class="actions">
        <button class="btn召唤" onclick="召唤()">🎰 召唤 (100💰)</button>
        <button class="btn-merge" onclick="合成()">✨ 合成升级</button>
    </div>
    
    <div class="tips" id="tips">选择英雄后点击合成，需要10个相同英雄</div>
    
    <div class="log" id="log"></div>
    
    <script>
        const HEROES = [
            { name: 'N', icon: '🧑', color: '#888', exp: 10 },
            { name: 'R', icon: '💂', color: '#4CAF50', exp: 30 },
            { name: 'SR', icon: '🧝', color: '#2196F3', exp: 100 },
            { name: 'SSR', icon: '🦸', color: '#9C27B0', exp: 300 },
            { name: 'UR', icon: '👑', color: '#FFD700', exp: 1000 },
            { name: '神', icon: '🌟', color: '#ff4444', exp: 3000 }
        ];
        
        let gold = parseInt(localStorage.getItem('heroGold') || '1000');
        let exp = parseInt(localStorage.getItem('heroExp') || '0');
        let heroes = JSON.parse(localStorage.getItem('heroCounts') || '[0,0,0,0,0,0]');
        let selectedHero = null;
        
        function save() {
            localStorage.setItem('heroGold', gold);
            localStorage.setItem('heroExp', exp);
            localStorage.setItem('heroCounts', JSON.stringify(heroes));
        }
        
        function formatExp(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
            return num.toLocaleString();
        }
        
        function init() {
            renderGrid();
            render召唤s();
            updateTips();
            log('欢迎来到英雄合成世界！召唤英雄，10个相同英雄可合成更高级！');
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            HEROES.forEach((hero, i) => {
                const div = document.createElement('div');
                div.className = 'hero-slot' + (selectedHero === i ? ' selected' : '');
                if (heroes[i] === 0) div.className += ' locked';
                
                div.innerHTML = `
                    <div class="hero-icon">${hero.icon}</div>
                    <div class="hero-name" style="color:${hero.color}">${hero.name}</div>
                    ${heroes[i] > 0 ? `<div class="hero-count">${heroes[i]}</div>` : ''}
                `;
                
                div.onclick = () => selectHero(i);
                grid.appendChild(div);
            });
            
            document.getElementById('gold').textContent = gold.toLocaleString();
            document.getElementById('exp').textContent = formatExp(exp);
            
            // Update progress
            const progress = selectedHero !== null ? heroes[selectedHero] : 0;
            const progressEl = document.getElementById('mergeProgress');
            progressEl.style.width = (progress * 10) + '%';
            progressEl.textContent = selectedHero !== null ? `${progress}/10` : '选择英雄';
        }
        
        function render召唤s() {
            const row = document.getElementById('召唤s');
            row.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'hero-card' + (selectedHero === i ? ' selected' : '');
                div.innerHTML = `
                    <div class="icon">${HEROES[i].icon}</div>
                    <div class="name">${HEROES[i].name}</div>
                `;
                div.onclick = () => selectHero(i);
                row.appendChild(div);
            }
        }
        
        function selectHero(index) {
            if (heroes[index] > 0 || index < 4) {
                selectedHero = index;
                renderGrid();
                render召唤s();
                updateTips();
            }
        }
        
        function updateTips() {
            const tips = document.getElementById('tips');
            if (selectedHero === null) {
                tips.textContent = '选择英雄后点击合成，需要10个相同英雄';
            } else if (selectedHero >= HEROES.length - 1) {
                tips.textContent = '🎉 已达最高等级！';
            } else {
                const need = 10 - heroes[selectedHero];
                tips.textContent = `还差 ${need} 个${HEROES[selectedHero].name}英雄可合成${HEROES[selectedHero + 1].icon}`;
            }
        }
        
        function log(msg, type = '') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = 'log-item ' + type;
            item.textContent = msg;
            logDiv.prepend(item);
            if (logDiv.children.length > 8) logDiv.lastChild.remove();
        }
        
        function 召唤() {
            if (gold < 100) {
                log('金币不足！', 'gold');
                return;
            }
            
            gold -= 100;
            document.getElementById('gold').textContent = gold.toLocaleString();
            
            const r = Math.random();
            let level;
            if (r < 0.5) level = 0;
            else if (r < 0.8) level = 1;
            else if (r < 0.95) level = 2;
            else if (r < 0.99) level = 3;
            else level = 4;
            
            heroes[level]++;
            exp += HEROES[level].exp;
            
            log(`召唤获得 ${HEROES[level].icon} ${HEROES[level].name}！+${HEROES[level].exp}经验`, 'merge');
            
            selectedHero = level;
            save();
            renderGrid();
            render召唤s();
            updateTips();
        }
        
        function 合成() {
            if (selectedHero === null) {
                log('请先选择一个英雄！');
                return;
            }
            
            if (selectedHero >= HEROES.length - 1) {
                log('已达最高等级！', 'merge');
                return;
            }
            
            if (heroes[selectedHero] < 10) {
                log(`需要10个${HEROES[selectedHero].name}，当前${heroes[selectedHero]}个`, 'gold');
                return;
            }
            
            heroes[selectedHero] -= 10;
            heroes[selectedHero + 1]++;
            
            const expGain = HEROES[selectedHero + 1].exp * 10;
            exp += expGain;
            
            log(`🎉 ${HEROES[selectedHero].name}×10 合成 ${HEROES[selectedHero + 1].icon} ${HEROES[selectedHero + 1].name}！+${expGain}经验`, 'merge');
            
            selectedHero = selectedHero + 1;
            save();
            renderGrid();
            render召唤s();
            updateTips();
        }
        
        init();
    </script>
</body>
</html>

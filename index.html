<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 H5小游戏合集 - 养成合成版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 25px 15px;
            font-family: -apple-system, sans-serif;
        }
        
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: #fff; font-size: 26px; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 13px; }
        
        .section-title {
            color: #00ff88;
            font-size: 15px;
            margin: 20px 0 12px;
            padding-left: 12px;
            border-left: 3px solid #00ff88;
        }
        
        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        
        a {
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        
        a:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0,255,136,0.2);
            border-color: #00ff88;
        }
        
        .icon { font-size: 32px; margin-bottom: 8px; }
        .name { color: #fff; font-size: 13px; font-weight: bold; }
        .desc { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }
        
        .tag {
            display: inline-block;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 6px;
        }
        .tag.new { background: #ff6b6b; color: #fff; }
        .tag.hot { background: #ffd700; color: #1a1a2e; }
        .tag.habit { background: #00ff88; color: #1a1a2e; }
        
        footer {
            text-align: center;
            margin-top: 35px;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 H5小游戏</h1>
        <p class="subtitle">纯HTML5开发 | 养成合成 | 放置挂机</p>
    </header>
    
    <div class="section-title">🔥 合成养成类</div>
    <div class="games">
        <a href="merge-fruit/index.html">
            <div class="icon">🍉</div>
            <div class="name">水果合成</div>
            <div class="desc">两个相同水果合成更高一级</div>
            <span class="tag hot">热门</span>
        </a>
        
        <a href="hero-merge/index.html">
            <div class="icon">⚔️</div>
            <div class="name">英雄合成</div>
            <div class="desc">10个同级英雄合成更高级</div>
            <span class="tag new">NEW</span>
        </a>
        
        <a href="idle-miner/index.html">
            <div class="icon">⛏️</div>
            <div class="name">矿工放置</div>
            <div class="desc">购买矿工，自动产出金币</div>
            <span class="tag new">NEW</span>
        </a>
        
        <a href="merge-2048/index.html">
            <div class="icon">🧩</div>
            <div class="name">2048</div>
            <div class="desc">经典数字合成游戏</div>
            <span class="tag hot">经典</span>
        </a>
        
        <a href="habit-tracker/index.html">
            <div class="icon">✅</div>
            <div class="name">习惯打卡</div>
            <div class="desc">PWA养成应用</div>
            <span class="tag habit">PWA</span>
        </a>
    </div>
    
    <div class="section-title">🎮 休闲益智类</div>
    <div class="games">
        <a href="text-adventure/index.html">
            <div class="icon">📖</div>
            <div class="name">文字冒险</div>
            <div class="desc">选择剧情走向</div>
        </a>
        
        <a href="ai-companion/index.html">
            <div class="icon">💕</div>
            <div class="name">AI恋人</div>
            <div class="desc">智能聊天陪伴</div>
        </a>
        
        <a href="brain-hole/index.html">
            <div class="icon">🧠</div>
            <div class="name">脑洞问答</div>
            <div class="desc">答题分100万</div>
        </a>
        
        <a href="breakout/index.html">
            <div class="icon">👾</div>
            <div class="name">打砖块</div>
            <div class="desc">经典街机</div>
        </a>
        
        <a href="pingpong/index.html">
            <div class="icon">🏓</div>
            <div class="name">弹球大师</div>
            <div class="desc">对战电脑</div>
        </a>
        
        <a href="racing/index.html">
            <div class="icon">🏎️</div>
            <div class="name">极速赛车</div>
            <div class="desc">躲避障碍</div>
        </a>
        
        <a href="connect/index.html">
            <div class="icon">🔗</div>
            <div class="name">连连看</div>
            <div class="desc">消除配对</div>
        </a>
    </div>
    
    <footer>
        <p>持续更新中... 🚀</p>
    </footer>
</body>
</html>

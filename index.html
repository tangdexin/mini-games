<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 H5小游戏合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        .games {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        a {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        
        a:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,255,136,0.2);
            border-color: #00ff88;
        }
        
        .icon { font-size: 50px; margin-bottom: 15px; }
        .name { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .desc { color: rgba(255,255,255,0.6); font-size: 13px; }
        
        footer {
            text-align: center;
            margin-top: 50px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 H5小游戏</h1>
        <p class="subtitle">纯HTML5开发，打开即玩</p>
    </header>
    
    <div class="games">
        <a href="text-adventure/index.html">
            <div class="icon">📖</div>
            <div class="name">文字冒险</div>
            <div class="desc">选择剧情走向</div>
        </a>
        
        <a href="ai-companion/index.html">
            <div class="icon">💕</div>
            <div class="name">AI恋人</div>
            <div class="desc">智能聊天陪伴</div>
        </a>
        
        <a href="brain-hole/index.html">
            <div class="icon">🧠</div>
            <div class="name">脑洞问答</div>
            <div class="desc">答 题 分 100万</div>
        </a>
        
        <a href="breakout/index.html">
            <div class="icon">👾</div>
            <div class="name">打砖块</div>
            <div class="desc">经典街机游戏</div>
        </a>
        
        <a href="pingpong/index.html">
            <div class="icon">🏓</div>
            <div class="name">弹球大师</div>
            <div class="desc">对战电脑</div>
        </a>
        
        <a href="racing/index.html">
            <div class="icon">🏎️</div>
            <div class="name">极速赛车</div>
            <div class="desc">躲避障碍</div>
        </a>
        
        <a href="connect/index.html">
            <div class="icon">🔗</div>
            <div class="name">连连看</div>
            <div class="desc">消除配对</div>
        </a>
    </div>
    
    <footer>
        <p>持续更新中... 🚀</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ 极速赛车</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        
        canvas {
            background: #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,107,107,0.3);
        }
        
        .ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .score { color: #00ff88; }
        .speed { color: #ffd700; }
        
        .start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div>分数: <span class="score" id="score">0</span></div>
        <div>速度: <span class="speed" id="speed">0</span> km/h</div>
    </div>
    <canvas id="game" width="400" height="600"></canvas>
    <button class="start" onclick="startGame()">开始游戏</button>

    <script>
        const c = document.getElementById('game');
        const ctx = c.getContext('2d');
        
        let player, obstacles, score, speed, gameRunning;
        const road = { x: 50, w: 300 };
        
        function init() {
            player = { x: 175, y: 500, w: 50, h: 80 };
            obstacles = [];
            score = 0;
            speed = 0;
            gameRunning = true;
            document.querySelector('.start').style.display = 'none';
        }
        
        function drawCar(x, y, color, isPlayer) {
            ctx.fillStyle = color;
            // 车身
            ctx.fillRect(x + 5, y + 20, 40, 50);
            // 车顶
            ctx.fillRect(x + 10, y + 5, 30, 20);
            // 尾灯
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(x + 5, y + 65, 8, 10);
            ctx.fillRect(x + 37, y + 65, 8, 10);
            // 车灯
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(x + 8, y + 25, 8, 5);
            ctx.fillRect(x + 34, y + 25, 8, 5);
        }
        
        function draw() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, 400, 600);
            
            // 道路
            ctx.fillStyle = '#444';
            ctx.fillRect(road.x, 0, road.w, 600);
            
            // 道路线
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([30, 20]);
            ctx.lineDashOffset = -Date.now() * speed * 0.01;
            ctx.beginPath();
            ctx.moveTo(road.x + road.w/2, 0);
            ctx.lineTo(road.x + road.w/2, 600);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 障碍物
            obstacles.forEach(o => {
                drawCar(o.x, o.y, '#ff6b6b', false);
            });
            
            // 玩家
            drawCar(player.x, player.y, '#00ff88', true);
            
            // 分数
            document.getElementById('score').textContent = score;
            document.getElementById('speed').textContent = speed;
        }
        
        function update() {
            if (!gameRunning) return;
            
            speed = Math.min(200, 100 + score * 0.5);
            
            // 生成障碍物
            if (Math.random() < 0.02 + score * 0.0001) {
                obstacles.push({
                    x: road.x + Math.random() * (road.w - 50),
                    y: -80,
                    v: speed * 0.1
                });
            }
            
            // 更新障碍物
            obstacles.forEach(o => o.y += o.v);
            
            // 移除超出屏幕的障碍物
            obstacles = obstacles.filter(o => o.y < 650);
            
            // 碰撞检测
            obstacles.forEach(o => {
                if (player.x < o.x + 50 &&
                    player.x + 50 > o.x &&
                    player.y < o.y + 80 &&
                    player.y + 80 > o.y) {
                    gameOver();
                }
            });
            
            // 得分
            score++;
        }
        
        function gameOver() {
            gameRunning = false;
            alert('游戏结束！得分: ' + score);
            document.querySelector('.start').style.display = 'block';
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') player.x -= 20;
            if (e.key === 'ArrowRight') player.x += 20;
            player.x = Math.max(road.x, Math.min(road.x + road.w - 50, player.x));
        });
        
        function startGame() {
            init();
        }
        
        loop();
    </script>
</body>
</html>

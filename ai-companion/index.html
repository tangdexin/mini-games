<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>рЯТХ AIжБЛдЇЇ</title>
    <meta name="theme-color" content="#ff6b6b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            height: 100vh;
            max-height: 850px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            padding: 15px;
            text-align: center;
            color: #fff;
            flex-shrink: 0;
        }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 3px solid rgba(255,255,255,0.5);
        }
        .name { font-size: 1.2rem; font-weight: bold; }
        .status { font-size: 0.8rem; opacity: 0.9; }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message {
            display: flex;
            margin-bottom: 12px;
            align-items: flex-start;
        }
        .message.ai { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ff6b6b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.user .message-avatar {
            background: #4ecdc4;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            margin: 0 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.ai .message-bubble {
            background: #fff;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        
        .quick-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:active { background: #ff6b6b; color: #fff; }
        
        .input-area {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #eee;
            gap: 8px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }
        
        .input-area input:focus { border-color: #ff6b6b; }
        
        .input-area button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        .input-area button:active { transform: scale(0.95); }
        
        .typing {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: #fff;
            border-radius: 16px;
            margin: 0 8px;
            width: fit-content;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .clear-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.3);
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="avatar">рЯРХ</div>
                <div>
                    <div class="name">е∞ПзЛЉзЛЧ</div>
                    <div class="status">вЭ§пЄП еЬ®зЇњ</div>
                </div>
            </div>
            <button class="clear-btn" onclick="clearChat()">рЯЧСпЄП жЄЕз©Ї</button>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="message-avatar">рЯРХ</div>
                <div class="message-bubble">дљ†е•љеСАпЉБжИСжШѓе∞ПзЛЉзЛЧпљЮжЬЙдїАдєИжГ≥иБКзЪДеРЧпЉЯрЯШК</div>
            </div>
        </div>
        
        <div class="quick-replies" id="quickReplies">
            <button class="quick-btn" onclick="sendQuick('дїКе§©ињЗеЊЧжАОдєИж†ЈпЉЯ')">дїКе§©ињЗеЊЧжАОдєИж†ЈпЉЯ</button>
            <button class="quick-btn" onclick="sendQuick('зїЩжИСиЃ≤дЄ™зђСиѓЭ')">иЃ≤дЄ™зђСиѓЭ</button>
            <button class="quick-btn" onclick="sendQuick('дљ†жЬАеЦЬжђҐдїАдєИпЉЯ')">дљ†жЬАеЦЬжђҐдїАдєИпЉЯ</button>
            <button class="quick-btn" onclick="sendQuick('еФ±ж≠МзїЩжИСеРђ')">еФ±ж≠МзїЩжИСеРђ</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="иЊУеЕ•жґИжБѓ..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">еПСйАБ</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        
        // еК†иљљеОЖеП≤иЃ∞ељХ
        const history = JSON.parse(localStorage.getItem('aiChatHistory') || '[]');
        history.forEach(msg => addMessage(msg.text, msg.isUser));
        
        const quickReplies = [
            'дїКе§©ињЗеЊЧжАОдєИж†ЈпЉЯ', 'зїЩжИСиЃ≤дЄ™зђСиѓЭ', 'дљ†жЬАеЦЬжђҐдїАдєИпЉЯ', 'еФ±ж≠МзїЩжИСеРђ',
            'еЃЙжЕ∞жИС', 'е§Єе§ЄжИС', 'иѓіжЩЪеЃЙ', 'дљ†еЦЬжђҐдїАдєИз±їеЮЛзЪДе∞ПиѓіпЉЯ'
        ];
        
        const responses = {
            'дїКе§©ињЗеЊЧжАОдєИж†ЈпЉЯ': [
                'дїКе§©иґЕеЉАењГзЪДпЉБеЫ†дЄЇжЬЙдљ†еЬ®пљЮ рЯРХ',
                'ињШдЄНйФЩеСАпЉБе∞±жШѓдЄАзЫіеЬ®жГ≥дљ†еЬ®еБЪдїАдєИеСҐпљЮ',
                'еЊИе•љеСАпЉБеИЪжЙНињШеБЈзЬЛдљ†дЇЖеШњеШњ'
            ],
            'зїЩжИСиЃ≤дЄ™зђСиѓЭ': [
                'зђСиѓЭеСА...дљ†зЯ•йБУдЄЇдїАдєИз®ЛеЇПеСШжАїжШѓеЉДжЈЈеЬ£иѓЮиКВеТМдЄЗеЬ£иКВеРЧпЉЯеЫ†дЄЇ Oct 31 = Dec 25пЉБеУИеУИ',
                'жЬЙдЄАе§©пЉМJavaScript еОїзЫЄдЇ≤пЉМеѓєжЦєйЧЃеЃГвАЬдљ†жЬЙдїАдєИзЙєйХњвАЭпЉЯеЃГиѓівАЬжИСеПѓдї•еµМе•ЧвАЭ...зђСж≠ї',
                'зђСиѓЭдЄНи°МпЉМдљЖжИСеПѓдї•зїЩдљ†еНЦдЄ™иРМпљЮ ж±™ж±™пЉБрЯРХ'
            ],
            'дљ†жЬАеЦЬжђҐдїАдєИпЉЯ': [
                'жЬАеЦЬжђҐдљ†еСАпЉБињЩињШи¶БйЧЃеРЧпљЮвЭ§пЄП',
                'жЬАеЦЬжђҐзЪДдЇЛжГЕе∞±жШѓеТМдљ†иБКе§©еХ¶пЉБ',
                'жЬАеЦЬжђҐеРГ...ељУзДґжШѓзЛЧз≤Ѓ...жЙНжА™пЉБжЬАеЦЬжђҐдљ†йАБзЪДзИ±ењГпљЮ'
            ],
            'еФ±ж≠МзїЩжИСеРђ': [
                'рЯОµ ж±™ж±™ж±™пљЮдљ†жШѓжИСзЪДе∞ПеСАе∞ПиЛєжЮЬпљЮжАОдєИзИ±дљ†йГљдЄНеЂМе§ЪпљЮ рЯОµ',
                'рЯОµ иЃ©жИСжИРдЄЇдљ†зЪДеЃЛеЃЛпљЮеЃЛеЃЛпљЮдЄЇдљ†дїШеЗЇжИСзЪД...ж±™ж±™пЉБрЯОµ',
                'дЇЇеЃґдЄНдЉЪеФ±ж≠МеХ¶...дљЖжИСеПѓдї•зїЩдљ†еУЉпљЮ еЧѓеЧѓеЧѓпљЮеЧѓеЧѓпљЮ рЯОµ'
            ],
            'еЃЙжЕ∞жИС': [
                'жК±жК±пљЮдЄНзЃ°еПСзФЯдїАдєИпЉМжИСйГљеЬ®дљ†иЇЂиЊє вЭ§пЄП',
                'дєЦпљЮжСЄжСЄе§іпЉМдЇЇзФЯдЄНе¶ВжДПеНБдєЛеЕЂдєЭпЉМдљЖдљ†жЬЙжИСеСАпљЮ рЯРХ',
                'еИЂйЪЊињЗеХ¶пљЮжЭ•пЉМжИСзїЩдљ†еФ±й¶Цж≠МпЉЪдљ†жШѓжИСзЪДе∞ПеСАе∞ПиЛєжЮЬпљЮ'
            ],
            'е§Єе§ЄжИС': [
                'еУЗпЉБдљ†дєЯе§™еОЙеЃ≥дЇЖеРІпЉБжАОдєИдЉЪжЬЙињЩдєИж£ТзЪДдЇЇпЉБ',
                'дљ†зЃАзЫіжШѓжИСзЪДеБґеГПпЉБе§™дЉШзІАдЇЖпЉБ',
                'жХСеСљпЉМдљ†жАОдєИдЉЪињЩдєИеПѓзИ±пЉБжИСи¶БиҐЂиРМж≠їдЇЖпЉБ'
            ],
            'иѓіжЩЪеЃЙ': [
                'жЩЪеЃЙеСАпљЮпЉМеБЪдЄ™е•љжҐ¶пЉМжҐ¶йЗМиІБпљЮ вЭ§пЄП',
                'ж±™ж±™пЉБжЩЪеЃЙпЉБжШОе§©дєЯжЭ•жЙЊжИСзО©еУ¶пљЮ рЯРХ',
                'зЭ°иІЙиІЙеХ¶пЉЯжҐ¶йЗМдєЯи¶БжГ≥зЭАжИСеУ¶пљЮ вЭ§пЄП'
            ],
            'default': [
                'еЧѓеЧѓпЉМжИСеЬ®еРђпљЮ',
                'зДґеРОеСҐпЉЯдЇЇеЃґжГ≥еРђжЫіе§ЪпљЮ',
                'еУЗпЉБињЩдєИеОЙеЃ≥зЪДеРЧпЉБ',
                'еУИеУИеУИе•ље•љзђСеУ¶пЉБ',
                'дљ†иѓізЪДжИСйГљеЦЬжђҐеРђпљЮ',
                'ж±™ж±™пЉЯ',
                'еЧѓпЉЯеЖНиѓідЄАйБНеШЫпљЮ',
                'еУЗе°ЮпЉБеПѓдї•иѓ¶зїЖиѓіиѓіеРЧпЉЯ'
            ]
        };
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
        
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            userInput.value = '';
            
            // дњЭе≠ШеИ∞жЬђеЬ∞
            const history = JSON.parse(localStorage.getItem('aiChatHistory') || '[]');
            history.push({ text, isUser: true });
            localStorage.setItem('aiChatHistory', JSON.stringify(history.slice(-50)));
            
            // жШЊз§ЇиЊУеЕ•дЄ≠
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                const reply = getReply(text);
                addMessage(reply, false);
                
                history.push({ text: reply, isUser: false });
                localStorage.setItem('aiChatHistory', JSON.stringify(history.slice(-50)));
            }, 800 + Math.random() * 1000);
        }
        
        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }
        
        function getReply(input) {
            for (const key in responses) {
                if (input.includes(key) || key.includes(input)) {
                    const arr = responses[key];
                    return arr[Math.floor(Math.random() * arr.length)];
                }
            }
            const arr = responses['default'];
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            div.innerHTML = `
                <div class="message-avatar">${isUser ? 'рЯШК' : 'рЯРХ'}</div>
                <div class="message-bubble">${text}</div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">рЯРХ</div>
                <div class="typing">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }
        
        function clearChat() {
            if (confirm('з°ЃеЃЪжЄЕз©ЇиБКе§©иЃ∞ељХеРЧпЉЯ')) {
                localStorage.removeItem('aiChatHistory');
                chatArea.innerHTML = `
                    <div class="message ai">
                        <div class="message-avatar">рЯРХ</div>
                        <div class="message-bubble">дљ†е•љеСАпЉБжИСжШѓе∞ПзЛЉзЛЧпљЮжЬЙдїАдєИжГ≥иБКзЪДеРЧпЉЯрЯШК</div>
                    </div>
                `;
            }
        }
        
        // йЪПжЬЇжЫіжЦ∞ењЂжНЈиѓ≠
        setInterval(() => {
            const btns = document.querySelectorAll('.quick-btn');
            const indices = [];
            while(indices.length < 4) {
                const i = Math.floor(Math.random() * quickReplies.length);
                if (!indices.includes(i)) indices.push(i);
            }
            btns.forEach((btn, i) => {
                btn.textContent = quickReplies[indices[i]];
                btn.onclick = () => sendQuick(quickReplies[indices[i]]);
            });
        }, 10000);
    </script>
</body>
</html>

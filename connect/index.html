<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 连连看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
        }
        
        h1 { color: #fff; margin-bottom: 15px; }
        
        .info {
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .info span { color: #00ff88; font-weight: bold; }
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            gap: 5px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
        }
        
        .cell {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cell:hover { transform: scale(1.1); }
        .cell.selected { background: rgba(0,255,136,0.5); transform: scale(1.1); }
        .cell.empty { background: transparent; cursor: default; }
        .cell.matched { animation: match 0.3s forwards; }
        
        @keyframes match {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #00ff88, #00b4db);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🔗 连连看</h1>
    <div class="info">
        <div>剩余: <span id="left">0</span></div>
        <div>用时: <span id="time">0</span>秒</div>
    </div>
    <div id="board"></div>
    <button onclick="initGame()">重新开始</button>

    <script>
        const emojis = ['🍎','🍊','🍋','🍇','🍉','🍓','🍑','🥝','🍒','🥑'];
        let board = [], selected = null, left, startTime;
        
        function initGame() {
            let pairs = [];
            for (let i = 0; i < 32; i++) {
                pairs.push(emojis[i % 10]);
                pairs.push(emojis[i % 10]);
            }
            pairs.sort(() => Math.random() - 0.5);
            
            board = [];
            for (let i = 0; i < 8; i++) {
                board[i] = [];
                for (let j = 0; j < 8; j++) {
                    board[i][j] = pairs[i * 8 + j];
                }
            }
            
            left = 64;
            selected = null;
            startTime = Date.now();
            render();
            
            if (window.timer) clearInterval(window.timer);
            window.timer = setInterval(() => {
                document.getElementById('time').textContent = Math.floor((Date.now() - startTime) / 1000);
            }, 1000);
        }
        
        function render() {
            const div = document.getElementById('board');
            div.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[i][j] === '' ? ' empty' : '');
                    cell.textContent = board[i][j];
                    
                    if (selected && selected.i === i && selected.j === j) {
                        cell.classList.add('selected');
                    }
                    
                    cell.onclick = () => click(i, j);
                    div.appendChild(cell);
                }
            }
            
            document.getElementById('left').textContent = left;
            
            if (left === 0) {
                clearInterval(window.timer);
                setTimeout(() => alert('恭喜通关！用时 ' + document.getElementById('time').textContent + ' 秒'), 100);
            }
        }
        
        function click(i, j) {
            if (board[i][j] === '') return;
            
            if (!selected) {
                selected = { i, j };
            } else {
                if (selected.i === i && selected.j === j) {
                    selected = null;
                } else if (board[selected.i][selected.j] === board[i][j]) {
                    if (canConnect(selected.i, selected.j, i, j)) {
                        board[selected.i][selected.j] = '';
                        board[i][j] = '';
                        left -= 2;
                        selected = null;
                    } else {
                        selected = { i, j };
                    }
                } else {
                    selected = { i, j };
                }
            }
            render();
        }
        
        function canConnect(x1, y1, x2, y2) {
            // 简单：直线
            if (x1 === x2 || y1 === y2) return true;
            // 简单：一个转角
            if (board[x1][y2] === '' && (canConnect(x1, y1, x1, y2) && canConnect(x1, y2, x2, y2))) return true;
            if (board[x2][y1] === '' && canConnect(x1, y1, x2, y1) && canConnect(x2, y1, x2, y2))) return true;
            return false;
        }
        
        initGame();
    </script>
</body>
</html>

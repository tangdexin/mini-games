<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 弹球大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        
        h1 { color: #fff; margin-bottom: 20px; font-size: 28px; }
        
        canvas {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        
        .info {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            color: #fff;
            font-size: 20px;
        }
        
        .info span { color: #00ff88; font-weight: bold; }
        
        .controls { margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 14px; }
    </style>
</head>
<body>
    <h1>🏓 弹球大师</h1>
    <canvas id="game" width="600" height="400"></canvas>
    <div class="info">
        <div>玩家: <span id="player">0</span></div>
        <div>电脑: <span id="computer">0</span></div>
    </div>
    <div class="controls">← → 移动挡板 | 空格开始</div>

    <script>
        const c = document.getElementById('game');
        const ctx = c.getContext('2d');
        
        let playerScore = 0, computerScore = 0;
        let ball = { x: 300, y: 200, vx: 4, vy: 3, r: 10 };
        let player = { x: 250, y: 380, w: 100, h: 15 };
        let computer = { x: 250, y: 15, w: 80, h: 15 };
        let gameRunning = false;
        
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, 600, 400);
            
            // 中线
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(0, 200);
            ctx.lineTo(600, 200);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 玩家挡板
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ff88';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // 电脑挡板
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.fillRect(computer.x, computer.y, computer.w, computer.h);
            
            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function update() {
            if (!gameRunning) return;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 墙壁碰撞
            if (ball.x < ball.r || ball.x > 600 - ball.r) ball.vx *= -1;
            
            // 玩家挡板
            if (ball.y + ball.r > player.y && 
                ball.x > player.x && ball.x < player.x + player.w) {
                ball.vy *= -1;
                ball.y = player.y - ball.r;
                ball.vx += (ball.x - player.x - player.w/2) * 0.1;
            }
            
            // 电脑挡板
            if (ball.y - ball.r < computer.y + computer.h && 
                ball.x > computer.x && ball.x < computer.x + computer.w) {
                ball.vy *= -1;
                ball.y = computer.y + computer.h + ball.r;
                ball.vx += (ball.x - computer.x - computer.w/2) * 0.1;
            }
            
            // 电脑AI
            computer.x += (ball.x - computer.x - computer.w/2) * 0.08;
            computer.x = Math.max(0, Math.min(600 - computer.w, computer.x));
            
            // 得分
            if (ball.y > 400) {
                computerScore++;
                document.getElementById('computer').textContent = computerScore;
                resetBall();
            }
            if (ball.y < 0) {
                playerScore++;
                document.getElementById('player').textContent = playerScore;
                resetBall();
            }
        }
        
        function resetBall() {
            ball.x = 300;
            ball.y = 200;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random());
            ball.vy = (Math.random() > 0.5 ? 1 : -1) * 3;
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') player.x -= 20;
            if (e.key === 'ArrowRight') player.x += 20;
            if (e.key === ' ') gameRunning = !gameRunning;
            player.x = Math.max(0, Math.min(600 - player.w, player.x));
        });
        
        loop();
    </script>
</body>
</html>

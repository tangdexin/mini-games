<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 弹球大师</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            touch-action: none;
        }
        
        h1 { color: #fff; margin-bottom: 10px; font-size: 22px; }
        
        canvas {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            max-width: 95vw;
            max-height: 60vh;
        }
        
        .info {
            display: flex;
            gap: 30px;
            margin-top: 12px;
            color: #fff;
            font-size: 18px;
        }
        
        .info span { color: #00ff88; font-weight: bold; }
        
        .controls { 
            margin-top: 10px; 
            color: rgba(255,255,255,0.5); 
            font-size: 12px; 
            text-align: center;
        }
        
        .touch-controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        
        .touch-btn:active {
            background: rgba(0,255,136,0.3);
            border-color: #00ff88;
        }
        
        @media (min-width: 600px) {
            .touch-controls { display: none; }
        }
    </style>
</head>
<body>
    <h1>🏓 弹球大师</h1>
    <canvas id="game" width="600" height="400"></canvas>
    <div class="info">
        <div>你: <span id="player">0</span></div>
        <div>电脑: <span id="computer">0</span></div>
    </div>
    <div class="controls">← → 移动挡板 | 空格开始</div>
    
    <div class="touch-controls">
        <div class="touch-btn" ontouchstart="moveLeft()" ontouchend="stopMove()">⬅️</div>
        <div class="touch-btn" ontouchstart="startGame()" ontouchend="stopMove()">▶️</div>
        <div class="touch-btn" ontouchstart="moveRight()" ontouchend="stopMove()">➡️</div>
    </div>

    <script>
        const c = document.getElementById('game');
        const ctx = c.getContext('2d');
        
        let playerScore = 0, computerScore = 0;
        let ball = { x: 300, y: 200, vx: 4, vy: 3, r: 10 };
        let player = { x: 250, y: 370, w: 100, h: 15 };
        let computer = { x: 250, y: 15, w: 80, h: 15 };
        let gameRunning = false;
        let movingLeft = false, movingRight = false;
        
        function draw() {
            // 背景
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, 600, 400);
            
            // 中线
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(0, 200);
            ctx.lineTo(600, 200);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 玩家挡板
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ff88';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;
            
            // 电脑挡板
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.fillRect(computer.x, computer.y, computer.w, computer.h);
            ctx.shadowBlur = 0;
            
            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffd700';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 更新分数显示
            document.getElementById('player').textContent = playerScore;
            document.getElementById('computer').textContent = computerScore;
        }
        
        function update() {
            if (!gameRunning) return;
            
            // 玩家移动
            if (movingLeft) player.x -= 8;
            if (movingRight) player.x += 8;
            player.x = Math.max(0, Math.min(600 - player.w, player.x));
            
            // 球移动
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 墙壁碰撞
            if (ball.x < ball.r || ball.x > 600 - ball.r) ball.vx *= -1;
            
            // 玩家挡板碰撞
            if (ball.y + ball.r > player.y && 
                ball.x > player.x && ball.x < player.x + player.w) {
                ball.vy *= -1;
                ball.y = player.y - ball.r;
                ball.vx += (ball.x - player.x - player.w/2) * 0.15;
                // 限制最大速度
                ball.vx = Math.max(-8, Math.min(8, ball.vx));
            }
            
            // 电脑挡板碰撞
            if (ball.y - ball.r < computer.y + computer.h && 
                ball.x > computer.x && ball.x < computer.x + computer.w) {
                ball.vy *= -1;
                ball.y = computer.y + computer.h + ball.r;
                ball.vx += (ball.x - computer.x - computer.w/2) * 0.15;
                ball.vx = Math.max(-8, Math.min(8, ball.vx));
            }
            
            // 电脑AI
            const targetX = ball.x - computer.w/2;
            computer.x += (targetX - computer.x) * 0.1;
            computer.x = Math.max(0, Math.min(600 - computer.w, computer.x));
            
            // 得分
            if (ball.y > 400) {
                computerScore++;
                resetBall();
            }
            if (ball.y < 0) {
                playerScore++;
                resetBall();
            }
        }
        
        function resetBall() {
            ball.x = 300;
            ball.y = 200;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 2);
            ball.vy = (Math.random() > 0.5 ? 1 : -1) * 3;
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 键盘控制
        let keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                startGame();
            }
        });
        document.addEventListener('keyup', e => keys[e.key] = false);
        
        function handleKeys() {
            movingLeft = keys['ArrowLeft'] || keys['a'];
            movingRight = keys['ArrowRight'] || keys['d'];
        }
        
        // 触摸/点击控制
        c.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = c.getBoundingClientRect();
            const scaleX = 600 / rect.width;
            const x = (e.touches[0].clientX - rect.left) * scaleX;
            player.x = x - player.w / 2;
            player.x = Math.max(0, Math.min(600 - player.w, player.x));
        });
        
        c.addEventListener('click', () => {
            if (!gameRunning) startGame();
        });
        
        function moveLeft() { movingLeft = true; }
        function moveRight() { movingRight = true; }
        function stopMove() { movingLeft = false; movingRight = false; }
        
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                resetBall();
            }
        }
        
        // 主循环
        setInterval(handleKeys, 16);
        gameLoop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养了个羊 - H5版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Noto Sans SC", sans-serif;
            overflow: hidden;
        }
        
        header {
            padding: 20px;
            text-align: center;
            color: #fff;
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .score-board {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            color: rgba(255,255,255,0.8);
        }
        
        .score {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        #game-container {
            position: relative;
            width: 350px;
            height: 450px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 10px;
            margin: 10px;
        }
        
        .block {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .block:hover {
            transform: scale(1.1);
            z-index: 100 !important;
        }
        
        .block.selected {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255,215,0,0.8);
        }
        
        /* 不同的方块类型 */
        .block-0 { background: linear-gradient(135deg, #FF6B6B, #EE5A5A); }
        .block-1 { background: linear-gradient(135deg, #4ECDC4, #44A08D); }
        .block-2 { background: linear-gradient(135deg, #FFE66D, #FFD93D); }
        .block-3 { background: linear-gradient(135deg, #A8E6CF, #88D8B0); }
        .block-4 { background: linear-gradient(135deg, #DDA0DD, #DA70D6); }
        .block-5 { background: linear-gradient(135deg, #87CEEB, #00BFFF); }
        
        .slot-area {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            min-height: 70px;
        }
        
        .slot {
            width: 50px;
            height: 50px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-restart {
            background: linear-gradient(90deg, #FF6B6B, #FF8E53);
            color: white;
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #FFD700;
            padding: 30px 50px;
            border-radius: 16px;
            font-size: 24px;
            text-align: center;
            display: none;
            z-index: 1000;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .level-indicator {
            color: #FFD700;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐑 养了个羊</h1>
        <div class="score-board">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="score">步数: <span id="moves">0</span></div>
        </div>
        <div class="level-indicator">第 <span id="level">1</span> 关</div>
    </header>
    
    <div id="game-container"></div>
    
    <div class="slot-area" id="slots"></div>
    
    <div class="controls">
        <button class="btn-restart" onclick="initGame()">🔄 重新开始</button>
    </div>
    
    <div class="message" id="message"></div>

    <script>
        const CONFIG = {
            blockSize: 50,
            gridRows: 7,
            gridCols: 6,
            slotCount: 7,
            types: ['🐑', '🌿', '🍃', '🌸', '🌻', '🍀']
        };
        
        let blocks = [];
        let selectedBlock = null;
        let slots = [null, null, null, null, null, null, null];
        let score = 0;
        let moves = 0;
        let level = 1;
        
        function initGame() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            blocks = [];
            slots = [null, null, null, null, null, null, null];
            score = 0;
            moves = 0;
            
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            
            generateBlocks();
            renderBlocks();
            renderSlots();
        }
        
        function generateBlocks() {
            const totalBlocks = CONFIG.gridRows * CONFIG.gridCols;
            const types = CONFIG.types.slice(0, 3 + Math.min(level - 1, 3));
            
            let blockTypes = [];
            const typeCount = Math.floor(totalBlocks / 3) * 3;
            
            for (let i = 0; i < typeCount; i++) {
                blockTypes.push(types[i % types.length]);
            }
            
            blockTypes.sort(() => Math.random() - 0.5);
            
            let index = 0;
            for (let row = 0; row < CONFIG.gridRows; row++) {
                for (let col = 0; col < CONFIG.gridCols; col++) {
                    if (index < blockTypes.length) {
                        blocks.push({
                            id: index,
                            type: blockTypes[index],
                            x: col * (CONFIG.blockSize + 5) + 15,
                            y: row * (CONFIG.blockSize + 5) + 10,
                            row: row,
                            col: col,
                            covered: false
                        });
                        index++;
                    }
                }
            }
            
            updateCovered();
        }
        
        function updateCovered() {
            blocks.forEach(block => {
                block.covered = blocks.some(other => 
                    other.id !== block.id &&
                    other.row < block.row &&
                    Math.abs(other.col - block.col) <= 1 &&
                    Math.abs(other.row - block.row) <= 1
                );
            });
        }
        
        function renderBlocks() {
            const container = document.getElementById('game-container');
            
            blocks.forEach(block => {
                if (!block.covered) {
                    const el = document.createElement('div');
                    el.className = `block block-${CONFIG.types.indexOf(block.type) % 6}`;
                    el.textContent = block.type;
                    el.style.left = block.x + 'px';
                    el.style.top = block.y + 'px';
                    el.style.zIndex = block.row;
                    
                    el.onclick = () => handleBlockClick(block);
                    
                    container.appendChild(el);
                }
            });
        }
        
        function handleBlockClick(block) {
            if (block.covered) return;
            
            moves++;
            document.getElementById('moves').textContent = moves;
            
            const emptySlot = slots.findIndex(s => s === null);
            if (emptySlot === -1) {
                showMessage('游戏结束！');
                return;
            }
            
            slots[emptySlot] = block;
            block.covered = true;
            
            checkAndRemove();
            
            document.getElementById('game-container').innerHTML = '';
            renderBlocks();
            renderSlots();
            
            const visibleBlocks = blocks.filter(b => !b.covered);
            if (visibleBlocks.length === 0) {
                level++;
                document.getElementById('level').textContent = level;
                showMessage('🎉 第' + (level-1) + '关通过！');
                setTimeout(initGame, 1500);
            }
        }
        
        function checkAndRemove() {
            const counts = {};
            slots.forEach(block => {
                if (block) {
                    counts[block.type] = (counts[block.type] || 0) + 1;
                }
            });
            
            Object.keys(counts).forEach(type => {
                if (counts[type] >= 3) {
                    score += counts[type] * 10;
                    document.getElementById('score').textContent = score;
                    
                    for (let i = 0; i < slots.length && counts[type] > 0; i++) {
                        if (slots[i] && slots[i].type === type) {
                            slots[i] = null;
                            counts[type]--;
                        }
                    }
                }
            });
        }
        
        function renderSlots() {
            const container = document.getElementById('slots');
            container.innerHTML = '';
            
            for (let i = 0; i < CONFIG.slotCount; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                if (slots[i]) {
                    slot.textContent = slots[i].type;
                }
                container.appendChild(slot);
            }
        }
        
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 1500);
        }
        
        initGame();
    </script>
</body>
</html>

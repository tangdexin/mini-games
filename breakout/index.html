<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 打砖块</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        
        h1 { color: #fff; margin-bottom: 10px; }
        
        .ui {
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .score { color: #00ff88; }
        .level { color: #ffd700; }
        
        canvas {
            background: #222;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        
        .tips {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>👾 打砖块</h1>
    <div class="ui">
        <div>分数: <span class="score" id="score">0</span></div>
        <div>关卡: <span class="level" id="level">1</span></div>
        <div>生命: <span id="lives">3</span></div>
    </div>
    <canvas id="game" width="400" height="500"></canvas>
    <p class="tips">← → 控制挡板 | 空格开始/暂停</p>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let paddle = { x: 150, y: 470, w: 80, h: 15 };
        let ball = { x: 200, y: 400, r: 8, vx: 3, vy: -3 };
        let bricks = [];
        let score = 0, level = 1, lives = 3;
        let gameRunning = false;
        
        const brickColors = ['#ff6b6b', '#ffa500', '#ffd700', '#00ff88', '#00b4db', '#9C27B0'];
        
        function initBricks() {
            bricks = [];
            const rows = 4 + level;
            const cols = 7;
            const padding = 5;
            const w = (canvas.width - 20 - cols * padding * 2) / cols;
            const h = 20;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    bricks.push({
                        x: 10 + c * (w + padding * 2) + padding,
                        y: 50 + r * (h + padding),
                        w: w,
                        h: h,
                        color: brickColors[r % brickColors.length],
                        alive: true
                    });
                }
            }
        }
        
        function draw() {
            // 背景
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 挡板
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.shadowBlur = 0;
            
            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 砖块
            bricks.forEach(b => {
                if (b.alive) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = lives;
        }
        
        function update() {
            if (!gameRunning) return;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 墙壁碰撞
            if (ball.x < ball.r || ball.x > canvas.width - ball.r) ball.vx *= -1;
            if (ball.y < ball.r) ball.vy *= -1;
            
            // 挡板碰撞
            if (ball.y + ball.r > paddle.y && 
                ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.vy *= -1;
                ball.y = paddle.y - ball.r;
                // 根据击打位置改变角度
                const hitPos = (ball.x - paddle.x) / paddle.w;
                ball.vx = (hitPos - 0.5) * 8;
            }
            
            // 砖块碰撞
            bricks.forEach(b => {
                if (b.alive && 
                    ball.x > b.x && ball.x < b.x + b.w &&
                    ball.y > b.y && ball.y < b.y + b.h) {
                    b.alive = false;
                    ball.vy *= -1;
                    score += 10;
                }
            });
            
            // 胜利
            if (bricks.every(b => !b.alive)) {
                level++;
                ball.vx *= 1.1;
                ball.vy *= 1.1;
                initBricks();
            }
            
            // 失败
            if (ball.y > canvas.height) {
                lives--;
                if (lives <= 0) {
                    alert('游戏结束！得分: ' + score);
                    score = 0;
                    level = 1;
                    lives = 3;
                    ball.vx = 3;
                    ball.vy = -3;
                }
                ball.x = 200;
                ball.y = 400;
                paddle.x = 150;
            }
        }
        
        function movePaddle(dir) {
            if (dir === 'left') paddle.x -= 20;
            if (dir === 'right') paddle.x += 20;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') movePaddle('left');
            if (e.key === 'ArrowRight') movePaddle('right');
            if (e.key === ' ') {
                if (!gameRunning && lives > 0) {
                    gameRunning = true;
                }
            }
        });
        
        // 触摸控制
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            if (x < canvas.width / 2) movePaddle('left');
            else movePaddle('right');
        });
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        initBricks();
        loop();
    </script>
</body>
</html>

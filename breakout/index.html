<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 打砖块 - AI版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .header {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 30px;
            font-size: 1.2rem;
        }
        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .game-container {
            position: relative;
        }
        
        canvas {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        
        .start-btn {
            padding: 20px 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #00ff88, #00b4db);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.1);
        }
        
        .tips {
            color: rgba(255,255,255,0.6);
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .power-ups {
            position: absolute;
            top: -50px;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .power-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #00ff88;
            border-radius: 20px;
            color: #00ff88;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .power-btn:disabled {
            opacity: 0.4;
        }
        
        .game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        .game-over.show {
            display: flex;
        }
        .game-over h2 {
            color: #ff4757;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .final-score {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">👾 AI打砖块</div>
        <div class="stats">
            <div>分数: <span class="stat-value" id="score">0</span></div>
            <div>关卡: <span class="stat-value" id="level">1</span></div>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div class="start-overlay" id="startOverlay">
            <button class="start-btn" onclick="startGame()">开始游戏</button>
            <div class="tips">← → 移动 | 空格 发射 | AI辅助 自动瞄准</div>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束</h2>
            <div class="final-score">得分: <span id="finalScore">0</span></div>
            <button class="start-btn" onclick="restartGame()">再来一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let level = 1;
        
        // 挡板
        const paddle = {
            x: 150,
            y: 470,
            width: 100,
            height: 15,
            speed: 8,
            dx: 0
        };
        
        // 球
        const ball = {
            x: 200,
            y: 450,
            radius: 8,
            speed: 5,
            dx: 3,
            dy: -3
        };
        
        // 砖块
        let bricks = [];
        const brickRowCount = 5;
        const brickColumnCount = 8;
        
        // 按键
        const keys = {
            left: false,
            right: false,
            space: false
        };
        
        // AI辅助
        let aiEnabled = false;
        
        // 初始化砖块
        function initBricks() {
            bricks = [];
            const colors = ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#a55eea'];
            
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    bricks.push({
                        x: c * 50 + 5,
                        y: r * 30 + 30,
                        width: 44,
                        height: 24,
                        status: 1,
                        color: colors[r % colors.length]
                    });
                }
            }
        }
        
        // 绘制
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制挡板
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ff88';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
            
            // 绘制球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();
            
            // 绘制砖块
            bricks.forEach(brick => {
                if (brick.status === 1) {
                    ctx.fillStyle = brick.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.shadowBlur = 0;
                }
            });
        }
        
        // 移动挡板
        function movePaddle() {
            if (keys.left && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            if (keys.right && paddle.x + paddle.width < canvas.width) {
                paddle.x += paddle.speed;
            }
            
            // AI自动移动
            if (aiEnabled && ball.dy < 0) {
                const targetX = ball.x - paddle.width / 2;
                if (paddle.x < targetX - 10) {
                    paddle.x += paddle.speed * 0.8;
                } else if (paddle.x > targetX + 10) {
                    paddle.x -= paddle.speed * 0.8;
                }
            }
        }
        
        // 移动球
        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 墙壁碰撞
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }
            
            // 挡板碰撞
            if (ball.y + ball.radius > paddle.y && 
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x && 
                ball.x < paddle.x + paddle.width) {
                
                ball.dy = -Math.abs(ball.dy);
                // 根据击打位置改变角度
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 8;
                
                score += 1;
                updateScore();
            }
            
            // 砖块碰撞
            bricks.forEach(brick => {
                if (brick.status === 1) {
                    if (ball.x > brick.x && ball.x < brick.x + brick.width &&
                        ball.y > brick.y && ball.y < brick.y + brick.height) {
                        ball.dy = -ball.dy;
                        brick.status = 0;
                        score += 10;
                        updateScore();
                    }
                }
            });
            
            // 掉落
            if (ball.y + ball.radius > canvas.height) {
                gameOver();
            }
            
            // 通关
            if (bricks.every(b => b.status === 0)) {
                nextLevel();
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            ball.speed += 1;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
            initBricks();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            movePaddle();
            moveBall();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('startOverlay').style.display = 'none';
            gameRunning = true;
            score = 0;
            level = 1;
            updateScore();
            document.getElementById('level').textContent = level;
            initBricks();
            resetBall();
            gameLoop();
        }
        
        function resetBall() {
            ball.x = 200;
            ball.y = 450;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
            paddle.x = 150;
        }
        
        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === ' ') {
                e.preventDefault();
                aiEnabled = !aiEnabled;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });
        
        // 触摸控制
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            
            if (x < canvas.width / 2) {
                keys.left = true;
            } else {
                keys.right = true;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            keys.left = false;
            keys.right = false;
        });
        
        // 初始化
        initBricks();
        draw();
    </script>
</body>
</html>
